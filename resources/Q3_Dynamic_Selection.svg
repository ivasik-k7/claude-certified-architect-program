<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 16px; fill: #2c3e50; font-weight: bold; }
      .small-label { font-size: 13px; fill: #555; }
      .tiny-label { font-size: 11px; fill: #777; }
      .box { fill: #ecf0f1; stroke: #34495e; stroke-width: 2; }
      .decision { fill: #f39c12; stroke: #d68910; stroke-width: 2; }
      .result-good { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; }
      .result-bad { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
      .arrow { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .text-white { fill: white; font-weight: bold; }
      .good { fill: #27ae60; font-weight: bold; }
      .highlight { fill: #e67e22; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#34495e" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">Q3: Dynamic Selection</text>
  <text x="600" y="85" text-anchor="middle" class="small-label">How does coordinator decide which agents to invoke? Not always all!</text>

  <!-- Decision Point -->
  <rect x="350" y="120" width="500" height="50" class="decision" rx="5"/>
  <text x="600" y="150" text-anchor="middle" class="text-white" font-size="16">NEW REQUEST arrives</text>

  <line x1="600" y1="170" x2="600" y2="210" class="arrow"/>

  <!-- Question 1 -->
  <rect x="250" y="210" width="700" height="50" class="box" rx="5"/>
  <text x="600" y="240" text-anchor="middle" class="label">Is this simple factual question I already know?</text>

  <!-- YES path -->
  <line x1="250" y1="260" x2="100" y2="300" class="arrow"/>
  <text x="160" y="280" class="small-label" font-weight="bold">YES</text>
  
  <rect x="20" y="300" width="160" height="60" class="result-good" rx="5"/>
  <text x="100" y="320" text-anchor="middle" class="text-white" font-size="14">1 API Call</text>
  <text x="100" y="340" text-anchor="middle" class="text-white" font-weight="bold">[synthesis]</text>

  <!-- NO path -->
  <line x1="950" y1="260" x2="1000" y2="300" class="arrow"/>
  <text x="970" y="280" class="small-label" font-weight="bold">NO</text>

  <!-- Question 2 -->
  <rect x="750" y="300" width="500" height="50" class="box" rx="5"/>
  <text x="1000" y="330" text-anchor="middle" class="label">Needs recent/external info?</text>

  <line x1="750" y1="350" x2="650" y2="390" class="arrow"/>
  <text x="680" y="380" class="small-label" font-weight="bold">YES</text>
  
  <rect x="550" y="390" width="200" height="50" class="result-good" rx="5"/>
  <text x="650" y="415" text-anchor="middle" class="text-white" font-weight="bold">Add [search]</text>

  <line x1="1000" y1="350" x2="1000" y2="390" class="arrow"/>
  <text x="1020" y="380" class="small-label" font-weight="bold">NO</text>

  <!-- Question 3 -->
  <rect x="750" y="390" width="500" height="50" class="box" rx="5"/>
  <text x="1000" y="420" text-anchor="middle" class="label">Needs deep analysis?</text>

  <line x1="1000" y1="440" x2="900" y2="480" class="arrow"/>
  <text x="940" y="470" class="small-label" font-weight="bold">YES</text>
  
  <rect x="800" y="480" width="200" height="50" class="result-good" rx="5"/>
  <text x="900" y="505" text-anchor="middle" class="text-white" font-weight="bold">Add [analysis]</text>

  <!-- Question 4 -->
  <line x1="1000" y1="440" x2="1050" y2="480" class="arrow"/>
  <text x="1030" y="470" class="small-label" font-weight="bold">MULTIPLE</text>

  <rect x="1050" y="480" width="200" height="50" class="box" rx="5"/>
  <text x="1150" y="510" text-anchor="middle" class="label">Verify conflicts?</text>

  <line x1="1150" y1="530" x2="1050" y2="570" class="arrow"/>
  <text x="1090" y="560" class="small-label" font-weight="bold">YES</text>
  
  <rect x="950" y="570" width="200" height="50" class="result-good" rx="5"/>
  <text x="1050" y="595" text-anchor="middle" class="text-white" font-weight="bold">Add [verify]</text>

  <!-- ========== EXAMPLES SECTION ========== -->
  <rect x="50" y="700" width="1100" height="280" class="box" rx="8"/>
  <text x="75" y="730" class="label" font-size="18">Examples of Dynamic Selection:</text>

  <!-- Example 1 -->
  <rect x="70" y="760" width="320" height="200" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5"/>
  <text x="90" y="785" class="label" font-size="14">"What is photosynthesis?"</text>
  
  <text x="90" y="810" class="tiny-label" font-weight="bold">Analysis:</text>
  <text x="110" y="828" class="tiny-label">• Simple Q</text>
  <text x="110" y="843" class="tiny-label">• I know answer</text>
  <text x="110" y="858" class="tiny-label">• No research needed</text>
  
  <rect x="90" y="875" width="260" height="40" class="result-good" rx="3"/>
  <text x="220" y="900" text-anchor="middle" class="text-white" font-weight="bold">AGENTS: [synthesis only]</text>
  <text x="220" y="918" text-anchor="middle" class="text-white" font-size="11">(1 API call) ⚡ FAST</text>

  <!-- Example 2 -->
  <rect x="440" y="760" width="320" height="200" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="460" y="785" class="label" font-size="14">"Latest AI news?"</text>
  
  <text x="460" y="810" class="tiny-label" font-weight="bold">Analysis:</text>
  <text x="480" y="828" class="tiny-label">• Recent info</text>
  <text x="480" y="843" class="tiny-label">• Complex topic</text>
  <text x="480" y="858" class="tiny-label">• Research needed</text>
  
  <rect x="460" y="875" width="260" height="40" class="result-good" rx="3"/>
  <text x="590" y="895" text-anchor="middle" class="text-white" font-size="12" font-weight="bold">AGENTS:</text>
  <text x="590" y="910" text-anchor="middle" class="text-white" font-size="11">[search+analysis+synthesis]</text>
  <text x="590" y="925" text-anchor="middle" class="text-white" font-size="10">(3 calls)</text>

  <!-- Example 3 -->
  <rect x="810" y="760" width="320" height="200" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="830" y="785" class="label" font-size="14">"Compare AI in 4 industries?"</text>
  
  <text x="830" y="810" class="tiny-label" font-weight="bold">Analysis:</text>
  <text x="850" y="828" class="tiny-label">• 4 topics</text>
  <text x="850" y="843" class="tiny-label">• Complex comparison</text>
  <text x="850" y="858" class="tiny-label">• Research 4 areas</text>
  
  <rect x="830" y="875" width="260" height="40" class="result-good" rx="3"/>
  <text x="960" y="895" text-anchor="middle" class="text-white" font-size="11" font-weight="bold">AGENTS:</text>
  <text x="960" y="910" text-anchor="middle" class="text-white" font-size="10">[search×4 PARALLEL +</text>
  <text x="960" y="923" text-anchor="middle" class="text-white" font-size="10">analysis + synthesis]</text>
</svg>
