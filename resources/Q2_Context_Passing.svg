<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-size: 28px; font-weight: bold; fill: #2c3e50; }
      .label { font-size: 16px; fill: #2c3e50; font-weight: bold; }
      .small-label { font-size: 13px; fill: #555; }
      .tiny-label { font-size: 11px; fill: #777; }
      .box { fill: #ecf0f1; stroke: #34495e; stroke-width: 2; }
      .hub { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
      .spoke { fill: #2ecc71; stroke: #27ae60; stroke-width: 2; }
      .arrow { stroke: #34495e; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-green { stroke: #27ae60; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
      .text-white { fill: white; font-weight: bold; }
      .bad { fill: #c0392b; font-weight: bold; font-size: 14px; }
      .good { fill: #27ae60; font-weight: bold; font-size: 14px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#34495e" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#27ae60" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" class="title">Q2: Context Passing</text>
  <text x="600" y="85" text-anchor="middle" class="small-label">Why can't subagents inherit coordinator's context? How to pass it?</text>

  <!-- ========== LEFT SIDE: WRONG WAY ========== -->
  <text x="250" y="140" class="label" font-size="18">❌ WRONG: Automatic Inheritance</text>

  <!-- Coordinator -->
  <circle cx="200" cy="220" r="35" class="hub"/>
  <text x="200" y="225" text-anchor="middle" class="text-white" font-size="12">Coordinator</text>

  <line x1="235" y1="220" x2="315" y2="220" class="arrow"/>

  <!-- SubAgent -->
  <circle cx="385" cy="220" r="35" class="spoke"/>
  <text x="385" y="225" text-anchor="middle" class="text-white" font-size="12">SubAgent</text>

  <!-- Context Box (Coordinator) -->
  <rect x="50" y="280" width="350" height="140" class="box" rx="5"/>
  <text x="70" y="305" class="label" font-size="14">Coordinator has:</text>
  <text x="85" y="330" class="tiny-label">• search_results: [article1, article2]</text>
  <text x="85" y="348" class="tiny-label">• analysis: [insight1, insight2]</text>
  <text x="85" y="366" class="tiny-label">• synthesis_plan: {...}</text>
  <text x="85" y="384" class="tiny-label">• metadata: {...}</text>

  <!-- Arrow down -->
  <line x1="225" y1="255" x2="225" y2="280" class="arrow"/>

  <!-- Problem Box -->
  <rect x="50" y="450" width="350" height="100" fill="#ffcccc" stroke="#c0392b" stroke-width="2" rx="5"/>
  <text x="225" y="480" text-anchor="middle" class="bad">SubAgent gets: NOTHING!</text>
  <text x="70" y="505" class="small-label">New API call = empty context</text>
  <text x="70" y="525" class="small-label">Claude doesn't know previous requests</text>

  <!-- ========== RIGHT SIDE: CORRECT WAY ========== -->
  <text x="950" y="140" class="label" font-size="18">✅ CORRECT: Explicit Passing</text>

  <!-- Coordinator -->
  <circle cx="900" cy="220" r="35" class="hub"/>
  <text x="900" y="225" text-anchor="middle" class="text-white" font-size="12">Coordinator</text>

  <!-- Include in prompt -->
  <text x="950" y="210" class="tiny-label" font-weight="bold">Include in prompt:</text>
  <text x="950" y="228" class="tiny-label">search_results: [...]</text>
  <text x="950" y="243" class="tiny-label">analysis: [...]</text>

  <!-- Arrow (green) -->
  <line x1="935" y1="215" x2="1020" y2="215" class="arrow-green"/>

  <!-- SubAgent -->
  <circle cx="1090" cy="220" r="35" class="spoke"/>
  <text x="1090" y="225" text-anchor="middle" class="text-white" font-size="12">SubAgent</text>

  <!-- Success Box -->
  <rect x="750" y="280" width="350" height="140" class="box" rx="5" fill="#ccffcc" stroke="#27ae60" stroke-width="2"/>
  <text x="770" y="305" class="label" font-size="14">Via prompt parameter:</text>
  <text x="785" y="330" class="tiny-label">synthesis_prompt = f"""</text>
  <text x="785" y="348" class="tiny-label">SEARCH RESULTS:</text>
  <text x="785" y="366" class="tiny-label">{json.dumps(search_results)}</text>
  <text x="785" y="384" class="tiny-label">ANALYSIS RESULTS:</text>
  <text x="785" y="402" class="tiny-label">{json.dumps(analysis_results)}"""</text>

  <!-- Success Arrow down -->
  <line x1="925" y1="255" x2="925" y2="280" class="arrow-green" stroke-width="3"/>

  <!-- Result Box -->
  <rect x="750" y="450" width="350" height="100" fill="#ccffcc" stroke="#27ae60" stroke-width="2" rx="5"/>
  <text x="925" y="480" text-anchor="middle" class="good">SubAgent gets: COMPLETE CONTEXT!</text>
  <text x="770" y="505" class="small-label">Via explicit prompt structure</text>
  <text x="770" y="525" class="small-label">All necessary data included</text>

  <!-- ========== BOTTOM: 3 METHODS ========== -->
  <rect x="50" y="600" width="1100" height="270" class="box" rx="8"/>
  <text x="75" y="630" class="label" font-size="18">3 Methods to Pass Context:</text>

  <!-- Method 1 -->
  <rect x="70" y="660" width="320" height="180" fill="#e8f4f8" stroke="#3498db" stroke-width="2" rx="5"/>
  <text x="90" y="685" class="label" font-size="14">Method 1: Direct JSON</text>
  <text x="90" y="710" class="tiny-label" font-weight="bold">Code:</text>
  <text x="90" y="728" class="tiny-label">prompt = f"""</text>
  <text x="90" y="743" class="tiny-label">Results from Search:</text>
  <text x="90" y="758" class="tiny-label">{json.dumps(</text>
  <text x="90" y="773" class="tiny-label">search_results)}</text>
  <text x="90" y="788" class="tiny-label">"""</text>
  <text x="90" y="810" class="good">✓ Simple, direct</text>
  <text x="90" y="828" class="good">✓ Works well</text>

  <!-- Method 2 -->
  <rect x="440" y="660" width="320" height="180" fill="#e8f8e8" stroke="#27ae60" stroke-width="2" rx="5"/>
  <text x="460" y="685" class="label" font-size="14">Method 2: Structured Block</text>
  <text x="460" y="710" class="tiny-label" font-weight="bold">Format:</text>
  <text x="460" y="728" class="tiny-label">COORDINATOR CONTEXT:</text>
  <text x="460" y="743" class="tiny-label">├─ Search Results:</text>
  <text x="460" y="758" class="tiny-label">├─ Analysis Results:</text>
  <text x="460" y="773" class="tiny-label">└─ Expected Areas:</text>
  <text x="460" y="793" class="tiny-label">YOUR TASK: Synthesize</text>
  <text x="460" y="810" class="good">✓ Very clear</text>
  <text x="460" y="828" class="good">✓ Professional</text>

  <!-- Method 3 -->
  <rect x="810" y="660" width="320" height="180" fill="#f8e8e8" stroke="#e67e22" stroke-width="2" rx="5"/>
  <text x="830" y="685" class="label" font-size="14">Method 3: Metadata</text>
  <text x="830" y="710" class="tiny-label" font-weight="bold">Include metadata:</text>
  <text x="830" y="728" class="tiny-label">{source, url, date,</text>
  <text x="830" y="743" class="tiny-label">credibility_score,</text>
  <text x="830" y="758" class="tiny-label">direct_quote}</text>
  <text x="830" y="778" class="tiny-label">Helps synthesis agent:</text>
  <text x="830" y="793" class="tiny-label">- Trust data</text>
  <text x="830" y="810" class="tiny-label">- Cite sources</text>
  <text x="830" y="828" class="good">✓ Most reliable</text>
</svg>
